<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastRabbit — 短剧生成工作台</title>
<link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<div class="container-main">
  <div class="topbar">
    <div class="brand">
      <div class="logo">▶</div>
      <h1>Fast<span>Rabbit</span></h1>
    </div>
    <button class="btn btn-primary" onclick="showNewProjectModal()">+ 新建短剧</button>
  </div>

  <div class="project-grid" id="projectGrid">
    <div style="grid-column:1/-1;text-align:center;padding:60px 0">
      <div class="spinner"></div>
      <p style="color:var(--text-muted);margin-top:12px">加载中...</p>
    </div>
  </div>
</div>

<!-- New Project Modal -->
<div class="modal" id="newProjectModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h3>新建短剧</h3>
        <button class="btn btn-outline btn-sm" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <label class="form-label">短剧名称</label>
        <input type="text" class="form-control" id="newName" placeholder="例如：我的短剧01" style="margin-bottom:14px">
        <label class="form-label">剧本文本（可选，后续也可上传）</label>
        <textarea class="form-control" id="newScript" placeholder="粘贴剧本文本..." style="min-height:160px"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="btnCreate" onclick="createProject()">创建</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
// ── 加载项目列表 ──
async function loadProjects() {
  const grid = document.getElementById('projectGrid');
  try {
    const res = await $.projects.list();
    const projects = Array.isArray(res.data) ? res.data : [];
    if (!projects.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 0">
        <div style="font-size:56px;opacity:0.1;margin-bottom:16px">▶</div>
        <p style="color:var(--text-muted);font-size:15px">还没有短剧项目</p>
        <button class="btn btn-primary" style="margin-top:12px" onclick="showNewProjectModal()">+ 创建第一部短剧</button>
      </div>`;
      return;
    }

    grid.innerHTML = projects.map(p => {
      const step = p.current_step || 1;
      const epCount = p.total_episodes || 0;
      const charCount = p.character_count || 0;
      const dots = Array.from({length:8}, (_,i) =>
        `<span class="dot${i<step?' done':''}${i===step-1?' current':''}"></span>`).join('');
      const coverImg = ''; // 从项目资产中加载封面（下次优化）
      return `<div class="project-card" onclick="openProject('${p.name}')">
        <div class="card-cover">
          ${coverImg ? `<img src="${coverImg}" alt="">` : `<span class="cover-placeholder">▶</span>`}
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-status">${step>1 ? '第'+step+'步：'+STEP_NAMES[step]||'' : '准备开始'}</div>
          <div class="step-dots" style="margin-bottom:10px">${dots}</div>
          <div class="card-stats">
            <span>📖 ${epCount||0}集</span>
            <span>👤 ${charCount||0}角色</span>
          </div>
        </div>
      </div>`;
    }).join('');

    // 加载封面图（异步，不阻塞卡片渲染）
    projects.forEach(async p => {
      try {
        const scenes = await $.projects.assets.scenes(p.name);
        if (scenes.data && scenes.data.length) {
          const card = grid.children[projects.indexOf(p)];
          const cover = card?.querySelector('.card-cover');
          if (cover) cover.innerHTML = `<img src="${scenes.data[0].image_url}" alt="">`;
        }
      } catch(e) {}
    });

  } catch(e) {
    grid.innerHTML = `<div class="alert alert-err" style="grid-column:1/-1">加载失败: ${e.message}</div>`;
  }
}

// ── 弹窗 ──
function showNewProjectModal() { document.getElementById('newProjectModal').classList.add('show'); }
function closeModal() { document.getElementById('newProjectModal').classList.remove('show'); }

document.getElementById('newProjectModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ── 创建项目 ──
async function createProject() {
  const name = document.getElementById('newName').value.trim();
  const script = document.getElementById('newScript').value;
  if (!name) return alert('请输入短剧名称');
  const btn = document.getElementById('btnCreate');
  btn.disabled = true; btn.textContent = '创建中...';
  const res = await $.projects.create(name, script);
  if (res.success) {
    closeModal();
    document.getElementById('newName').value = '';
    document.getElementById('newScript').value = '';
    loadProjects();
  } else {
    alert('创建失败: ' + (res.error || res.detail));
  }
  btn.disabled = false; btn.textContent = '创建';
}

// ── 打开项目工作台 ──
function openProject(name) {
  location.href = `/workspace.html#/project/${name}`;
}

// ── 初始化 ──
loadProjects();
</script>
</body>
</html>
